[project]
name = "ml-moscow-python-demo"
version = "0.1.0"
description = "Efficient Titanic survival prediction ML application"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "polars>=0.20.0",
    "scikit-learn>=1.5.0",
    "xgboost>=2.0.0",
    "optuna>=3.6.0",
    "pydantic>=2.6.0",
    "typer>=0.12.0",
    "rich>=13.7.0",
    "loguru>=0.7.0",
    "joblib>=1.4.0",
    "numpy>=1.26.0",
    "plotly>=5.17.0",
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.1.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.3.0",
    "mypy>=1.9.0",
    "pre-commit>=3.7.0",
]

[project.scripts]
titanic-train = "titanic_ml.cli:train_command"
titanic-predict = "titanic_ml.cli:predict_command"
titanic-serve = "titanic_ml.cli:serve_command"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["titanic_ml"]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "--cov=titanic_ml --cov-report=term-missing"
