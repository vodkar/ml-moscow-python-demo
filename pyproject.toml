[project]
name = "ml-moscow-python-demo"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
	"pandas>=2.2.0",
	"scikit-learn>=1.4.0",
	"joblib>=1.3.2",
	"typer>=0.12.3",
]

[project.scripts]
titanic-ml = "titanic_ml.main:app"

[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["titanic_ml*"]
